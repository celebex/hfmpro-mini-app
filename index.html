<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lightweight Music Player</title>
    <style>
        :root {
            --primary: #1db954;
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --text-sec: #b3b3b3;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Container Utama */
        .player-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Album Art / Visualizer Placeholder */
        .album-art {
            width: 240px;
            height: 240px;
            background: linear-gradient(135deg, #444, #222);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .album-art.playing {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* Info Lagu */
        .track-info {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .track-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 14px;
            color: var(--text-sec);
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 320px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: transform 0.1s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active { transform: scale(0.9); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-main {
            width: 64px;
            height: 64px;
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4);
        }
        
        .btn-main svg { width: 28px; height: 28px; fill: currentColor; }
        .btn-small svg { width: 24px; height: 24px; fill: currentColor; }

        /* Progress Bar Sederhana */
        .progress-container {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 20px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        /* Status Loop */
        .loop-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 12px;
            display: none;
        }
        .loop-indicator.active { display: block; color: var(--primary); }

        /* Hidden YouTube Container */
        #youtube-wrapper {
            position: absolute;
            top: -9999px;
            left: -9999px;
            visibility: hidden;
        }
        
        /* Overlay untuk "Click to Start" (User Interaction Safe) */
        .start-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        
        .start-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Overlay Awal untuk User Interaction Policy -->
    <div id="start-overlay" class="start-overlay">
        <h2>Music Player</h2>
        <p style="color: #aaa; font-size: 14px; margin-top: 10px;">Tap below to start playing music</p>
        <button class="start-btn" id="init-btn">▶ Play Music</button>
    </div>

    <div class="player-container">
        <div class="loop-indicator" id="loop-status">🔁 Loop On</div>
        
        <div class="album-art" id="album-art">
            🎵
        </div>

        <div class="track-info">
            <div class="track-title" id="title">Loading...</div>
            <div class="track-artist" id="artist">Please wait</div>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="controls">
            <button class="btn btn-small" id="prev-btn" aria-label="Previous">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <button class="btn btn-main" id="play-btn" aria-label="Play/Pause">
                <!-- Play Icon Default -->
                <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <!-- Pause Icon (Hidden) -->
                <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            
            <button class="btn btn-small" id="next-btn" aria-label="Next">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>

    <!-- Hidden YouTube Player -->
    <div id="youtube-wrapper"></div>

    <script>
        // --- KONFIGURASI PLAYLIST (ID YouTube) ---
        // Playlist Campuran: Indonesia & Barat (Lofi, Ambient, Akustik)
        const playlist = [
            {
                title: "Ambient Dreams",
                artist: "Atmospheric Sounds",
                id: "DWcJFNfaw9c" // Western Ambient
            },
            {
                title: "Lofi Study Beats",
                artist: "Chill Instrumental",
                id: "jfKfPfyJRdk" // Western Lofi Hip Hop
            },
            {
                title: "Hujan di Jakarta",
                artist: "Indonesian Lo-Fi",
                id: "5qap5aO4i9A" // Lofi Girl style - Indonesian vibe
            },
            {
                title: "Senja di Bali",
                artist: "Tropical Vibes",
                id: "2Vv-BfVoq4g" // Ed Sheeran Perfect (Instrumental/Cover vibe)
            },
            {
                title: "Smooth Jazz Cafe",
                artist: "Western Jazz",
                id: "neV3EPgvZ3g" // Relaxing Jazz Music
            },
            {
                title: "Akustik Nusantara",
                artist: "Indonesian Acoustic",
                id: "M7FIvfx5J10" // Acoustic Guitar Instrumental
            }
        ];

        let player;
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isLooping = true; // Default Auto-Loop ON
        let updateInterval;

        // DOM Elements
        const ui = {
            overlay: document.getElementById('start-overlay'),
            initBtn: document.getElementById('init-btn'),
            title: document.getElementById('title'),
            artist: document.getElementById('artist'),
            playBtn: document.getElementById('play-btn'),
            nextBtn: document.getElementById('next-btn'),
            prevBtn: document.getElementById('prev-btn'),
            iconPlay: document.getElementById('icon-play'),
            iconPause: document.getElementById('icon-pause'),
            progressBar: document.getElementById('progress-bar'),
            progressContainer: document.getElementById('progress-container'),
            albumArt: document.getElementById('album-art'),
            loopStatus: document.getElementById('loop-status')
        };

        // 1. Inisialisasi YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            // Player akan dibuat setelah user klik (User Interaction Safe)
        }

        function createPlayer(videoId) {
            if (player) {
                player.loadVideoById(videoId);
                return;
            }

            player = new YT.Player('youtube-wrapper', {
                height: '200',
                width: '200',
                videoId: videoId,
                playerVars: {
                    'playsinline': 1, // Penting untuk Mobile
                    'controls': 0,    // Hide default controls
                    'disablekb': 1,
                    'fs': 0,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 2. Logika User Interaction Safe
        ui.initBtn.addEventListener('click', () => {
            ui.overlay.style.opacity = '0';
            setTimeout(() => ui.overlay.style.display = 'none', 300);
            
            // Mulai player pertama
            createPlayer(playlist[currentTrackIndex].id);
        });

        function onPlayerReady(event) {
            updateTrackInfo();
            // Autoplay setelah ready (karena sudah ada user click sebelumnya)
            player.playVideo();
        }

        function onPlayerStateChange(event) {
            // YT.PlayerState.PLAYING = 1
            // YT.PlayerState.PAUSED = 2
            // YT.PlayerState.ENDED = 0
            
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                updatePlayIcon();
                ui.albumArt.classList.add('playing');
                startProgressLoop();
            } else if (event.data === YT.PlayerState.PAUSED) {
                isPlaying = false;
                updatePlayIcon();
                ui.albumArt.classList.remove('playing');
                stopProgressLoop();
            } else if (event.data === YT.PlayerState.ENDED) {
                handleTrackEnd();
            }
        }

        // 3. Kontrol Playlist & Looping
        function handleTrackEnd() {
            if (isLooping) {
                // Loop lagu yang sama
                player.seekTo(0);
                player.playVideo();
            } else {
                // Next lagu
                nextTrack();
            }
        }

        function loadTrack(index) {
            if (!player) return;
            currentTrackIndex = index;
            updateTrackInfo();
            player.loadVideoById(playlist[index].id);
        }

        function nextTrack() {
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= playlist.length) nextIndex = 0;
            loadTrack(nextIndex);
        }

        function prevTrack() {
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = playlist.length - 1;
            loadTrack(prevIndex);
        }

        function togglePlay() {
            if (!player) return;
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function toggleLoop() {
            isLooping = !isLooping;
            ui.loopStatus.classList.toggle('active', isLooping);
        }

        // 4. UI Updates
        function updateTrackInfo() {
            const track = playlist[currentTrackIndex];
            ui.title.textContent = track.title;
            ui.artist.textContent = track.artist;
            ui.progressBar.style.width = '0%';
        }

        function updatePlayIcon() {
            if (isPlaying) {
                ui.iconPlay.style.display = 'none';
                ui.iconPause.style.display = 'block';
            } else {
                ui.iconPlay.style.display = 'block';
                ui.iconPause.style.display = 'none';
            }
        }

        function startProgressLoop() {
            stopProgressLoop();
            updateInterval = setInterval(() => {
                if (!player || !player.getCurrentTime) return;
                const currentTime = player.getCurrentTime();
                const duration = player.getDuration();
                
                if (duration > 0) {
                    const percent = (currentTime / duration) * 100;
                    ui.progressBar.style.width = `${percent}%`;
                }
            }, 500);
        }

        function stopProgressLoop() {
            if (updateInterval) clearInterval(updateInterval);
        }

        // Event Listeners
        ui.playBtn.addEventListener('click', togglePlay);
        ui.nextBtn.addEventListener('click', nextTrack);
        ui.prevBtn.addEventListener('click', prevTrack);
        
        ui.progressContainer.addEventListener('click', (e) => {
            if (!player) return;
            const rect = ui.progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            const duration = player.getDuration();
            player.seekTo(pos * duration, true);
        });

        // Double click untuk toggle loop
        ui.albumArt.addEventListener('dblclick', toggleLoop);

    </script>
</body>
</html>
